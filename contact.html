<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Us | SL Phone Hub</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .contact-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 40px; 
            padding: 150px 10% 80px;
        }
        .contact-info h2 { font-size: 2.5rem; margin-bottom: 20px; }
        .contact-card { padding: 30px; margin-bottom: 20px; border-left: 4px solid var(--accent); }
    </style>
</head>
<body>
    <div class="glass-bg"></div>
    <div class="contact-grid">
        <div class="contact-info">
            <h2>Get in <span>Touch.</span></h2>
            <p style="color: var(--text-sub);">Have questions about the iPhone 16 Pro Max or our Wattala store location? We are here to help.</p>
            
            <div class="glass-panel contact-card" style="margin-top: 30px;">
                <h4>📍 Location</h4>
                <p>Wattala, Sri Lanka</p>
            </div>
            
            <div class="glass-panel contact-card">
                <h4>📞 Hotline</h4>
                <p>+94 75 250 0097</p>
            </div>
        </div>

        <div class="glass-panel" style="padding: 40px; text-align: center;">
            <h3>Direct Support</h3>
            <p style="margin: 20px 0;">The fastest way to reach our team for orders or repair services.</p>
            <a href="https://wa.me/94752500097" class="cta-btn" style="display: inline-block; background: #25d366; color: white; padding: 15px 40px; border-radius: 50px; text-decoration: none; font-weight: bold;">Order via WhatsApp</a>
        </div>
    </div>
</body>
</html>
