<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Warranty Check | SL Phone Hub</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="glass-bg"></div>
    <nav class="navbar">
        <div class="logo">📱 SL Phone <span>HUB</span></div>
    </nav>

    <div class="container" style="padding-top: 150px; display: flex; justify-content: center;">
        <div class="glass-panel" style="max-width: 600px; width: 100%; padding: 50px; text-align: center;">
            <h2 style="margin-bottom: 20px;">Warranty <span>Verification</span></h2>
            <p style="color: var(--text-sub); margin-bottom: 30px;">Check your 1-Year Company Warranty and TRCSL approval status.</p>
            
            <div style="background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; border: 1px solid var(--glass-border);">
                <input type="text" placeholder="Enter IMEI or Serial Number" style="width: 100%; padding: 15px; background: transparent; border: none; color: white; font-size: 1rem; outline: none;">
            </div>
            
            <button class="cta-btn" style="width: 100%; margin-top: 20px; background: var(--accent); color: white; border: none; cursor: pointer;">Verify Device</button>
            
            <p style="font-size: 0.8rem; color: var(--text-sub); margin-top: 20px;">*Only for devices purchased through SL Phone Hub Wattala.</p>
        </div>
    </div>
</body>
</html>
